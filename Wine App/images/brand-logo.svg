<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200" role="img" aria-label="Vinegar and Jaggery Store logo">
  <defs>
    <style>
      .brand-text { font-family: 'Segoe UI', Roboto, Arial, sans-serif; font-weight:700; fill:#ffffff; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#000000" />
  <!-- stylized bag/brush mark -->
  <g transform="translate(40,20) scale(1.0)">
